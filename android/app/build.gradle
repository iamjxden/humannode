plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}
android {
    namespace "com.humannode.app"
    compileSdk = 35
    ndkVersion "27.0.12077973"
    defaultConfig {
        applicationId "com.humannode.app"
        minSdk 24
        targetSdk flutter.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }
    buildTypes {
        release { signingConfig signingConfigs.debug; ndk { abiFilters 'arm64-v8a' } }
        debug { ndk { abiFilters 'arm64-v8a', 'x86_64' } }
    }
    kotlinOptions { jvmTarget = "17" }
}
flutter { source "../.." }
dependencies {}
