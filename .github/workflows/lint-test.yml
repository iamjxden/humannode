name: Lint & Test
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
