name: humannode
description: HumanNode - Local-first mobile AI workspace. Run LLMs directly on your device.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ^3.24.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  path_provider: ^2.1.4
  path: ^1.9.0
  ffi: ^2.1.2
  go_router: ^14.3.0
  flutter_markdown: ^0.7.3
  markdown: ^7.2.2
  file_picker: ^8.1.2
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  animations: ^2.0.11
  shimmer: ^3.0.0
  uuid: ^4.5.1
  logging: ^1.2.0
  collection: ^1.18.0
  crypto: ^3.0.3
  http: ^1.2.2
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/prompts/
    - assets/models/
